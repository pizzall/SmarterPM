<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmarterPM · 公司执行模拟系统</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">●</span>
      <h1>SmarterPM</h1>
      <span class="subtitle">公司执行模拟系统</span>
    </div>
    <nav class="nav">
      <a href="#/org" data-view="org">组织管理</a>
      <a href="#/employees" data-view="employees">人员档案</a>
      <a href="#/tasks" data-view="tasks">任务</a>
      <a href="#/planning" data-view="planning">任务规划</a>
      <a href="#/ability-updates" data-view="ability-updates">能力值待审</a>
    </nav>
    <div class="db-tools">
      <button id="btn-export" class="btn btn-secondary" title="下载 database.json">导出数据库</button>
      <label class="btn btn-secondary" title="上传 database.json 覆盖当前数据">
        导入数据库
        <input id="btn-import" type="file" accept="application/json" hidden />
      </label>
      <button id="btn-reset" class="btn btn-warning" title="恢复内置示例数据">重置</button>
    </div>
  </header>

  <main id="app-main" class="app-main">
    <div class="loading">加载中…</div>
  </main>

  <button id="chat-fab" class="chat-fab" title="自由对话">问问 AI</button>
  <aside id="chat-panel" class="chat-panel hidden">
    <div class="chat-header">
      <span>自由对话</span>
      <button id="chat-close" class="btn btn-ghost">×</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="chat-form">
      <textarea id="chat-input" rows="2" placeholder="问点什么 / 提点建议…"></textarea>
      <button class="btn btn-primary" type="submit">发送</button>
    </form>
  </aside>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/api.js"></script>
  <script src="/js/views/org.js"></script>
  <script src="/js/views/employees.js"></script>
  <script src="/js/views/tasks.js"></script>
  <script src="/js/views/planning.js"></script>
  <script src="/js/views/proposals.js"></script>
  <script src="/js/views/review.js"></script>
  <script src="/js/views/ability_updates.js"></script>
  <script src="/js/views/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
